# .gitremotes.yml — Declarative Git Remote Definitions
# Variables: ${VAR} resolved from environment at apply time.
# Apply:  mars remotes apply [--recursive]
remotes:
  origin:
    url: "git@gitlab-local:mars/external/gitlab-mcp.git"
  org:
    url: "git@${MARS_ORG_GITLAB_HOST}:${MARS_ORG_GITLAB_NS}/external/gitlab-mcp.git"
  github:
    url: "git@github.com:${MARS_GITHUB_USER}/gitlab-mcp.git"
  upstream:
    url: "git@github.com:zereight/gitlab-mcp.git"
